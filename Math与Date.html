       //编写一个函数，获得一个十六进制的随机颜色的字符串方法
       function getColor(){
        var  str ="1234567890abcdef";
        var color = "#";
        for(var i=0;i<6;i++){
            var num=Math.floor(Math.random()*str.length);
            color = color+str[num];
        }
        return color;
       }
